<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>MediBot · Turnos online y agenda para profesionales de la salud</title>
    <meta name="description" content="MediBot es la agenda online para médicos y psicólogos. Tus pacientes reservan turnos desde un link único, recibís recordatorios por WhatsApp y gestionás tu consultorio en un panel simple." />
    <meta name="author" content="MediBot" />
    <meta name="theme-color" content="#3B4A38" />
    <meta name="color-scheme" content="light" />
    <link rel="canonical" href="https://panel-medico-pied.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MediBot" />
    <meta property="og:title" content="MediBot · Turnos online y agenda para profesionales de la salud" />
    <meta property="og:description" content="Tus pacientes reservan desde un link único, recibís recordatorios por WhatsApp y gestionás tu consultorio en un panel simple." />
    <meta property="og:url" content="https://panel-medico-pied.vercel.app/" />
    <meta property="og:image" content="https://panel-medico-pied.vercel.app/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="MediBot — agenda online para profesionales de la salud" />
    <meta property="og:locale" content="es_AR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MediBot · Turnos online y agenda para profesionales de la salud" />
    <meta name="twitter:description" content="Tus pacientes reservan desde un link único, recibís recordatorios por WhatsApp y gestionás tu consultorio en un panel simple." />
    <meta name="twitter:image" content="https://panel-medico-pied.vercel.app/og-default.png" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Fonts — preconnect (handshake), the actual stylesheet is deferred via media trick -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap"
      onload="this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap"
      />
    </noscript>

    <!-- Structured data: Organization + WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://panel-medico-pied.vercel.app/#org",
            "name": "MediBot",
            "url": "https://panel-medico-pied.vercel.app/",
            "logo": "https://panel-medico-pied.vercel.app/og-default.png",
            "description": "Agenda online y gestor de turnos para profesionales de la salud en Argentina.",
            "areaServed": "AR",
            "sameAs": []
          },
          {
            "@type": "WebSite",
            "@id": "https://panel-medico-pied.vercel.app/#website",
            "url": "https://panel-medico-pied.vercel.app/",
            "name": "MediBot",
            "publisher": { "@id": "https://panel-medico-pied.vercel.app/#org" },
            "inLanguage": "es-AR",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://panel-medico-pied.vercel.app/?q={query}",
              "query-input": "required name=query"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
